<!DOCTYPE html>
<html>
<head>
    <title>School Timetable Generator</title>
    <link rel="stylesheet" href="style.css">

    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<h1>School Timetable Generator</h1>

<div class="form-container">

    <label>Periods Per Day:</label>
    <input type="number" id="periods" value="6">

    <h3>Add Subject</h3>
    <input type="text" id="subjectName" placeholder="Subject Name">
    <input type="text" id="teacherName" placeholder="Teacher Name">
    <input type="number" id="subjectCount" placeholder="Times Per Week">

    <button onclick="addOrUpdateSubject()">Add / Update</button>

    <ul id="subjectList"></ul>

    <button class="generate-btn" onclick="generateSchedule()">Generate Timetable</button>
    <button class="reset-btn" onclick="resetAll()">Refresh / Reset</button>
    <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>

</div>

<div id="timetable"></div>

<script src="script.js"></script>
</body>
</html>
