<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Class × Period Teacher Timetable</title>
  <link rel="stylesheet" href="style.css">

  <!-- jsPDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
  <h1>🏫 Class × Period Teacher Timetable</h1>
  <p class="subtitle">
    Rows = Classes • Columns = Periods • One teacher cannot teach two classes in the same period
  </p>

  <div class="container">

    <!-- Teachers -->
    <div class="card">
      <h2>👨‍🏫 Teachers</h2>
      <div class="row">
        <input id="teacherInput" type="text" placeholder="Teacher Name">
        <button class="small-primary" onclick="addOrUpdateTeacher()">Add / Update</button>
      </div>
      <ul id="teacherList"></ul>
    </div>

    <!-- Classes -->
    <div class="card">
      <h2>🏷️ Classes</h2>
      <div class="row">
        <input id="classInput" type="text" placeholder="Class Name (e.g., 6A)">
        <button class="small-primary" onclick="addOrUpdateClass()">Add / Update</button>
      </div>
      <ul id="classList"></ul>
    </div>

    <!-- Periods + ALL Buttons -->
    <div class="card">
      <h2>⏱️ Period Settings</h2>

      <div class="row">
        <input id="periodCount" type="number" min="1" placeholder="Number of Periods">
      </div>

      <label class="toggle">
        <input type="checkbox" id="autoAdjust" checked>
        Auto-adjust row after manual change
      </label>

      <!-- ✅ ALL BUTTONS TOGETHER -->
      <div class="btn-bar">
        <button class="btn build" onclick="buildGrid()">Build Timetable</button>
        <button class="btn generate" onclick="generateTimetable()">Generate Timetable</button>
        <button class="btn reset" onclick="resetAll()">Reset</button>
        <button class="btn pdf" onclick="downloadPDF()">Download PDF</button>
      </div>

      <p class="hint">
        Build = empty grid • Generate = auto-fill • Reset = clear all • PDF = download timetable
      </p>
    </div>

  </div>

  <div id="gridArea"></div>

  <script src="script.js"></script>
</body>
</html>
